<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyForge — Password Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0b0d;
      --surface: #111318;
      --surface2: #181c24;
      --border: #2a2f3a;
      --accent: #00e5ff;
      --accent2: #ff3d71;
      --text: #e8eaf0;
      --muted: #6b7280;
      --green: #00ff88;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .logo-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 0 60px rgba(0,229,255,0.04), 0 20px 40px rgba(0,0,0,0.4);
    }

    /* Password output */
    .output-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .output-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .password-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      transition: border-color 0.2s;
    }

    .password-box:focus-within,
    .password-box.copied {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
    }

    #passwordOutput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      color: var(--text);
      letter-spacing: 0.06em;
      word-break: break-all;
      cursor: default;
      user-select: all;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:hover { color: var(--accent); background: rgba(0,229,255,0.08); }

    /* Strength bar */
    .strength-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .strength-bars {
      display: flex;
      gap: 4px;
      flex: 1;
    }

    .bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    .bar.active-weak   { background: var(--accent2); }
    .bar.active-fair   { background: #ffb347; }
    .bar.active-strong { background: #a8e063; }
    .bar.active-great  { background: var(--green); }

    .strength-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 50px;
      text-align: right;
      transition: color 0.3s;
    }

    /* Length slider */
    .section { margin-bottom: 1.5rem; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
    }

    .length-value {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      box-shadow: 0 0 10px rgba(0,229,255,0.4);
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 16px rgba(0,229,255,0.7);
    }

    /* Checkboxes */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }

    .option:hover { border-color: rgba(0,229,255,0.3); }

    .option input[type="checkbox"] { display: none; }

    .checkbox-visual {
      width: 18px; height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      font-size: 11px;
    }

    .option input:checked ~ .checkbox-visual {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .option-text {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* Generate button */
    .generate-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .generate-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,229,255,0.35);
    }

    .generate-btn:active { transform: translateY(0); }

    /* History */
    .history-section {
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .clear-btn {
      background: none;
      border: none;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .clear-btn:hover { color: var(--accent2); }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .history-item:hover {
      border-color: rgba(0,229,255,0.25);
      color: var(--text);
    }

    .history-item .h-pw { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .h-copy { color: var(--border); font-size: 0.6rem; flex-shrink: 0; margin-left: 8px; }
    .history-item:hover .h-copy { color: var(--accent); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      padding: 10px 20px;
      border-radius: 6px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Footer */
    footer {
      margin-top: 2rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-badge">
      <span class="dot"></span>
      SYSTEM SECURE — v2.0
    </div>
    <h1>Key<span>Forge</span></h1>
    <p class="subtitle">// cryptographically strong password generator</p>
  </header>

  <div class="card">
    <!-- Output -->
    <div class="output-wrap">
      <div class="output-label">// generated password</div>
      <div class="password-box" id="passwordBox">
        <input type="text" id="passwordOutput" readonly value="Click generate..." />
        <button class="icon-btn" id="copyBtn" title="Copy password" onclick="copyPassword()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
        <button class="icon-btn" title="Regenerate" onclick="generate()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Strength -->
    <div class="strength-row">
      <div class="strength-bars">
        <div class="bar" id="bar1"></div>
        <div class="bar" id="bar2"></div>
        <div class="bar" id="bar3"></div>
        <div class="bar" id="bar4"></div>
      </div>
      <div class="strength-label" id="strengthLabel">—</div>
    </div>

    <!-- Length -->
    <div class="section">
      <div class="section-header">
        <span class="section-label">Length</span>
        <span class="length-value" id="lengthDisplay">16</span>
      </div>
      <input type="range" id="lengthSlider" min="6" max="64" value="16"
        oninput="document.getElementById('lengthDisplay').textContent=this.value; generate();" />
    </div>

    <!-- Options -->
    <div class="section">
      <div class="section-header">
        <span class="section-label">Character Types</span>
      </div>
      <div class="options-grid">
        <label class="option">
          <input type="checkbox" id="optUpper" checked onchange="generate()">
          <span class="checkbox-visual">✓</span>
          <span class="option-text">Uppercase</span>
        </label>
        <label class="option">
          <input type="checkbox" id="optLower" checked onchange="generate()">
          <span class="checkbox-visual">✓</span>
          <span class="option-text">Lowercase</span>
        </label>
        <label class="option">
          <input type="checkbox" id="optNumbers" checked onchange="generate()">
          <span class="checkbox-visual">✓</span>
          <span class="option-text">Numbers</span>
        </label>
        <label class="option">
          <input type="checkbox" id="optSymbols" onchange="generate()">
          <span class="checkbox-visual">✓</span>
          <span class="option-text">Symbols</span>
        </label>
      </div>
    </div>

    <!-- Generate -->
    <button class="generate-btn" onclick="generate()">⚡ Generate Password</button>

    <!-- History -->
    <div class="history-section">
      <div class="history-header">
        <span class="section-label">Recent</span>
        <button class="clear-btn" onclick="clearHistory()">Clear all</button>
      </div>
      <div class="history-list" id="historyList">
        <div style="font-family: var(--mono); font-size:0.7rem; color: var(--muted); text-align:center; padding: 12px 0;">
          No history yet
        </div>
      </div>
    </div>
  </div>

  <footer>
    Built with ❤️ — all generation happens in your browser.<br />
    No passwords are sent to any server. Ever.<br />
    <span style="opacity:0.4">KeyForge &copy; 2026</span>
  </footer>
</div>

<div class="toast" id="toast">COPIED!</div>

<script>
  const CHARS = {
    upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:   'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  let history = [];

  function getCharset() {
    let charset = '';
    if (document.getElementById('optUpper').checked)   charset += CHARS.upper;
    if (document.getElementById('optLower').checked)   charset += CHARS.lower;
    if (document.getElementById('optNumbers').checked) charset += CHARS.numbers;
    if (document.getElementById('optSymbols').checked) charset += CHARS.symbols;
    return charset;
  }

  function generate() {
    const length = parseInt(document.getElementById('lengthSlider').value);
    const charset = getCharset();

    if (!charset) {
      document.getElementById('passwordOutput').value = 'Select at least one type!';
      updateStrength('');
      return;
    }

    // Cryptographically secure random generation
    const array = new Uint32Array(length);
    crypto.getRandomValues(array);
    let password = '';
    for (let i = 0; i < length; i++) {
      password += charset[array[i] % charset.length];
    }

    // Guarantee at least one char from each selected type
    const guaranteed = [];
    const types = ['optUpper','optLower','optNumbers','optSymbols'];
    const keys  = ['upper','lower','numbers','symbols'];
    types.forEach((id, i) => {
      if (document.getElementById(id).checked) {
        const arr = new Uint32Array(1);
        crypto.getRandomValues(arr);
        guaranteed.push({ char: CHARS[keys[i]][arr[0] % CHARS[keys[i]].length], pos: i });
      }
    });
    guaranteed.forEach(({ char, pos }) => {
      if (pos < password.length) {
        password = password.substring(0, pos) + char + password.substring(pos + 1);
      }
    });

    document.getElementById('passwordOutput').value = password;
    updateStrength(password);
    addToHistory(password);
  }

  function scorePassword(pw) {
    let score = 0;
    if (pw.length >= 12) score++;
    if (pw.length >= 20) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
  }

  function updateStrength(pw) {
    const bars = [1,2,3,4].map(n => document.getElementById('bar' + n));
    const label = document.getElementById('strengthLabel');
    bars.forEach(b => b.className = 'bar');

    if (!pw) { label.textContent = '—'; label.style.color = ''; return; }

    const score = scorePassword(pw);
    const levels = [
      { cls: 'active-weak',   text: 'WEAK',   color: '#ff3d71' },
      { cls: 'active-fair',   text: 'FAIR',   color: '#ffb347' },
      { cls: 'active-strong', text: 'STRONG', color: '#a8e063' },
      { cls: 'active-great',  text: 'GREAT',  color: '#00ff88' },
    ];
    const lvl = levels[score - 1] || levels[0];
    for (let i = 0; i < score; i++) bars[i].classList.add(lvl.cls);
    label.textContent = lvl.text;
    label.style.color = lvl.color;
  }

  function copyPassword() {
    const pw = document.getElementById('passwordOutput').value;
    if (!pw || pw === 'Click generate...' || pw === 'Select at least one type!') return;
    navigator.clipboard.writeText(pw).then(() => showToast());
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    const box = document.getElementById('passwordBox');
    box.classList.add('copied');
    setTimeout(() => { t.classList.remove('show'); box.classList.remove('copied'); }, 1800);
  }

  function addToHistory(pw) {
    history = [pw, ...history.filter(p => p !== pw)].slice(0, 8);
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = '<div style="font-family: var(--mono); font-size:0.7rem; color: var(--muted); text-align:center; padding: 12px 0;">No history yet</div>';
      return;
    }
    list.innerHTML = history.map(pw => `
      <div class="history-item" onclick="copyFromHistory('${pw.replace(/'/g,"\\'")}')">
        <span class="h-pw">${pw}</span>
        <span class="h-copy">COPY</span>
      </div>
    `).join('');
  }

  function copyFromHistory(pw) {
    navigator.clipboard.writeText(pw).then(() => showToast());
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  // Auto-generate on load
  generate();
</script>
</body>
</html>
